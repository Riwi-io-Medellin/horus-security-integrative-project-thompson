version: "3.9"

services:
  scanner-api:
    image: node:20-alpine
    working_dir: /workspace/api
    command: ["npm", "run", "start"]
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
    depends_on:
      - kali-scanner

  kali-scanner:
    build:
      context: ./kali
      dockerfile: Dockerfile
    image: kali-security-scanner

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: security
      POSTGRES_USER: security
      POSTGRES_PASSWORD: security
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  security-api:
    build:
      context: .
      dockerfile: api/Dockerfile.fastapi
    ports:
      - "8001:8001"
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      KALI_CONTAINER: kali-security-scanner
      ML_MODEL_PATH: /app/engine/ml/models
      AUTO_REMEDIATION: "false"
      ML_INFERENCE_TIMEOUT_MS: "100"
      CORRELATION_RULES_PATH: /app/engine/correlation_rules.json
    depends_on:
      - kali-scanner
      - db

  ml-trainer:
    build:
      context: .
      dockerfile: engine/ml/Dockerfile
    profiles: ["training"]
    volumes:
      - ./engine/ml/models:/workspace/engine/ml/models
      - ./engine/ml/datasets:/workspace/engine/ml/datasets

volumes:
  pgdata:
